name: Release

# Build + publish on a version tag (e.g. `git tag v0.1.0 && git push --tags`).
# Produces a DRAFT GitHub Release with the macOS DMG attached; publish it by hand.
# Not Apple-notarised (no paid Developer ID) — the app is ad-hoc only, so first launch
# needs right-click → Open (the website explains this).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-latest # Apple Silicon runner → arm64 build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build renderer/main/preload
        run: npm run build

      - name: Package DMG + publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --mac --publish always
